services:
  mariadb:
    image: mariadb:10.6
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      BEDO_ENV: ${BEDO_ENV:-local}
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-change-this-root-password}
      MYSQL_DATABASE: ${MARIADB_DATABASE:-frappe}
      MYSQL_USER: ${MARIADB_USER:-frappe}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD:-change-this-db-password}
    volumes:
      - mariadb-data:/var/lib/mysql
    ports:
      - "3306:3306"

  redis-cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  redis-queue:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  redis-socketio:
    image: redis:7-alpine
    ports:
      - "6381:6379"

  frappe:
    image: frappe/bench:latest
    depends_on:
      - mariadb
      - redis-cache
      - redis-queue
      - redis-socketio
    working_dir: /workspace/BEDO-ERP
    command: bash /workspace/BEDO-ERP/infrastructure/scripts/start_frappe.sh
    environment:
      BEDO_ENV: ${BEDO_ENV:-local}
      FRAPPE_BRANCH: ${FRAPPE_BRANCH:-version-15}
      FRAPPE_BENCH_PATH: ${FRAPPE_BENCH_PATH:-/workspace/frappe-bench}
      BEDO_APP_NAME: ${BEDO_APP_NAME:-bedo_platform}
      BEDO_APP_PATH: ${BEDO_APP_PATH:-/workspace/BEDO-ERP/apps/bedo_platform}
      FRAPPE_SITE_NAME: ${FRAPPE_SITE_NAME:-bedo.localhost}
      FRAPPE_ADMIN_PASSWORD: ${FRAPPE_ADMIN_PASSWORD:-change-this-site-admin-password}
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-change-this-root-password}
      REDIS_CACHE_URL: ${REDIS_CACHE_URL:-redis://redis-cache:6379}
      REDIS_QUEUE_URL: ${REDIS_QUEUE_URL:-redis://redis-queue:6379}
      REDIS_SOCKETIO_URL: ${REDIS_SOCKETIO_URL:-redis://redis-socketio:6379}
      BEDO_SEED_DEFAULT_PASSWORD: ${BEDO_SEED_DEFAULT_PASSWORD:-replace-me-local-seed-password}
      BEDO_SEED_GM_PASSWORD: ${BEDO_SEED_GM_PASSWORD:-}
      BEDO_WEB_PUBLIC_URL: ${BEDO_WEB_PUBLIC_URL:-http://localhost:3000}
      BEDO_WEB_SERVICE_SECRET: ${BEDO_WEB_SERVICE_SECRET:-replace-me-shared-bff-secret}
      BEDO_SRS_DEADLINE_MODE: ${BEDO_SRS_DEADLINE_MODE:-working_days}
    volumes:
      - .:/workspace/BEDO-ERP
      - bench-data:/workspace/frappe-bench
    ports:
      - "8000:8000"
      - "9000:9000"

  bedo-web:
    image: node:20-alpine
    depends_on:
      - frappe
    working_dir: /workspace/BEDO-ERP/apps/web/bedo-web
    command: sh -lc "npm install && npm run dev"
    environment:
      BEDO_ENV: ${BEDO_ENV:-local}
      FRAPPE_INTERNAL_URL: ${FRAPPE_INTERNAL_URL:-http://frappe:8000}
      BEDO_SESSION_REDIS_URL: ${BEDO_SESSION_REDIS_URL:-redis://redis-cache:6379}
      NEXT_PUBLIC_BEDO_APP_NAME: ${NEXT_PUBLIC_BEDO_APP_NAME:-BEDO}
      BEDO_WEB_SESSION_SECRET: ${BEDO_WEB_SESSION_SECRET:-replace-me-long-next-session-secret}
      BEDO_WEB_SERVICE_SECRET: ${BEDO_WEB_SERVICE_SECRET:-replace-me-shared-bff-secret}
      BEDO_WEB_ALLOWED_ORIGIN: ${BEDO_WEB_ALLOWED_ORIGIN:-http://localhost:3000}
    volumes:
      - .:/workspace/BEDO-ERP
      - bedo-web-node-modules:/workspace/BEDO-ERP/apps/web/bedo-web/node_modules
    ports:
      - "3000:3000"

volumes:
  mariadb-data:
  bench-data:
  bedo-web-node-modules:
