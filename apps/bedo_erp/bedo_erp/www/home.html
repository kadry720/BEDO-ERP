{% extends "templates/web.html" %}

{% block page_content %}
<div class="container py-4">
  <h3>BEDO ERP Home</h3>
  <p>Current user: {{ current_user }}</p>
  <p>Current roles: {{ roles | join(", ") }}</p>
  <p>Department: {{ department or "" }}</p>
  <div class="row">
    {% for card in placeholder_cards %}
    <div class="col-md-3 mb-3">
      <div class="border rounded p-3">{{ card }}</div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
